name: Required Approvers

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: required-approvers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  required-approvers-gate:
    name: Required Approvers Gate
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Validate required approvers
        uses: actions/github-script@v7
        env:
          ALLOWED_APPROVERS: RodrigoMontenegrofarias96
          MIN_APPROVALS: "1"
        with:
          script: |
            const allowedApprovers = process.env.ALLOWED_APPROVERS
              .split(",")
              .map((login) => login.trim())
              .filter(Boolean);
            const minimumApprovals = Number(process.env.MIN_APPROVALS || "1");

            const pullRequest = context.payload.pull_request;

            if (!pullRequest) {
              core.setFailed("This workflow only supports pull request events.");
              return;
            }

            if (pullRequest.draft) {
              core.notice("Draft pull request detected. The gate will be enforced once the PR is ready for review.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pullRequest.number;
            const headSha = pullRequest.head.sha;
            const author = pullRequest.user.login.toLowerCase();

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            reviews.sort((left, right) => {
              return new Date(left.submitted_at || left.created_at).getTime()
                - new Date(right.submitted_at || right.created_at).getTime();
            });

            const activeApprovals = new Map();
            const lastRelevantReview = new Map();

            for (const review of reviews) {
              const login = review.user?.login?.toLowerCase();

              if (!login) {
                continue;
              }

              if (review.state === "APPROVED") {
                activeApprovals.set(login, review);
                lastRelevantReview.set(login, review);
                continue;
              }

              if (review.state === "CHANGES_REQUESTED" || review.state === "DISMISSED") {
                activeApprovals.delete(login);
                lastRelevantReview.set(login, review);
              }
            }

            const validApprovals = [];
            const pendingApprovals = [];

            for (const approver of allowedApprovers) {
              const approverKey = approver.toLowerCase();

              if (approverKey === author) {
                pendingApprovals.push(`${approver}: is the PR author and cannot self-approve`);
                continue;
              }

              const approval = activeApprovals.get(approverKey);

              if (!approval) {
                const lastReview = lastRelevantReview.get(approverKey);

                if (lastReview) {
                  pendingApprovals.push(`${approver}: latest decisive review is ${lastReview.state}`);
                } else {
                  pendingApprovals.push(`${approver}: approval not found`);
                }

                continue;
              }

              if (approval.commit_id !== headSha) {
                pendingApprovals.push(
                  `${approver}: approval is for ${approval.commit_id.slice(0, 7)}, current head is ${headSha.slice(0, 7)}`
                );
                continue;
              }

              validApprovals.push(`${approver}: approved ${headSha.slice(0, 7)}`);
            }

            await core.summary
              .addHeading("Allowed approvers")
              .addList(allowedApprovers)
              .addHeading("Minimum approvals required")
              .addRaw(String(minimumApprovals))
              .addHeading("Valid approvals")
              .addList(validApprovals.length ? validApprovals : ["None"])
              .addHeading("Pending or invalid")
              .addList(pendingApprovals.length ? pendingApprovals : ["None"])
              .write();

            if (validApprovals.length < minimumApprovals) {
              core.setFailed(
                `This pull request needs at least ${minimumApprovals} valid approval(s) from: ${allowedApprovers.join(", ")}`
              );
              return;
            }

            core.info("The pull request has enough valid approvals from the allowed approvers.");
